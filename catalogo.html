<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catálogo — Beaver Books</title>
  <meta name="description" content="Explore o catálogo de livros da Beaver Books. Encontre sua próxima leitura favorita.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,700;0,800;1,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="catalogo.css">
</head>
<body>

<!-- ── Header ──────────────────────────────────────────────────────────── -->
<header class="header">
  <div class="header-inner">
    <a href="/" class="logo">Beaver <span>Books</span></a>

    <nav class="header-nav">
      <a href="index-beaver-books.html">Início</a>
      <a href="catalogo.html" class="active">Catálogo</a>
      <a href="contato-beaver-books.html">Publicar</a>
    </nav>

    <button class="cart-btn" id="cart-btn" aria-label="Abrir carrinho">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4zM3 6h18M16 10a4 4 0 01-8 0"/>
      </svg>
      Carrinho
      <span class="cart-badge hidden" aria-live="polite">0</span>
    </button>
  </div>
</header>

<!-- ── Main ────────────────────────────────────────────────────────────── -->
<main class="page">

  <h1 class="page-title">Catálogo</h1>
  <p class="page-subtitle">Descubra os livros publicados pela Beaver Books</p>

  <!-- Search -->
  <form class="search-bar" id="search-form" role="search">
    <div class="search-input-wrap">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input
        type="search"
        id="search-input"
        placeholder="Buscar por título ou autor…"
        autocomplete="off"
        aria-label="Buscar livros"
      >
    </div>
    <button type="submit" class="search-btn">Buscar</button>
  </form>

  <!-- Filters -->
  <div class="filters" role="group" aria-label="Filtros">
    <span class="filter-label">Filtrar por:</span>

    <select class="filter-select" id="filter-genero" aria-label="Gênero">
      <option value="">Todos os gêneros</option>
    </select>

    <select class="filter-select" id="filter-preco-min" aria-label="Preço mínimo">
      <option value="">Preço mín.</option>
      <option value="0">R$ 0</option>
      <option value="20">R$ 20</option>
      <option value="40">R$ 40</option>
      <option value="60">R$ 60</option>
      <option value="80">R$ 80</option>
      <option value="100">R$ 100</option>
    </select>

    <select class="filter-select" id="filter-preco-max" aria-label="Preço máximo">
      <option value="">Preço máx.</option>
      <option value="20">até R$ 20</option>
      <option value="40">até R$ 40</option>
      <option value="60">até R$ 60</option>
      <option value="80">até R$ 80</option>
      <option value="100">até R$ 100</option>
      <option value="200">até R$ 200</option>
    </select>

    <select class="filter-select" id="filter-order" aria-label="Ordenar por">
      <option value="recentes">Mais recentes</option>
      <option value="preco_asc">Menor preço</option>
      <option value="preco_desc">Maior preço</option>
      <option value="titulo">Título A–Z</option>
    </select>

    <button type="button" class="filter-clear-btn" onclick="clearFilters()">Limpar filtros</button>
  </div>

  <!-- Results count -->
  <p class="results-info" id="results-info" aria-live="polite"></p>

  <!-- Grid -->
  <div class="books-grid" id="books-grid" role="list" aria-label="Lista de livros"></div>

  <!-- Pagination -->
  <nav class="pagination" id="pagination" aria-label="Páginas"></nav>

</main>

<!-- ── Footer ──────────────────────────────────────────────────────────── -->
<footer class="footer">
  <p>© <span id="footer-year"></span> Beaver Books — Todos os direitos reservados.</p>
</footer>

<!-- ── Cart Sidebar ─────────────────────────────────────────────────────── -->
<div class="cart-overlay" id="cart-overlay" role="presentation"></div>

<aside class="cart-sidebar" id="cart-sidebar" aria-label="Carrinho de compras">
  <div class="cart-header">
    <h2>Carrinho</h2>
    <button class="cart-close-btn" id="cart-close-btn" aria-label="Fechar carrinho">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M18 6L6 18M6 6l12 12"/>
      </svg>
    </button>
  </div>

  <div class="cart-items" id="cart-items" role="list"></div>

  <div class="cart-footer">
    <div class="cart-total-row">
      <span class="cart-total-label">Total</span>
      <span class="cart-total-value" id="cart-total-value">R$ 0,00</span>
    </div>
    <button class="checkout-btn" id="checkout-btn" disabled>
      Finalizar compra
    </button>
  </div>
</aside>

<!-- ── Checkout Modal ────────────────────────────────────────────────────── -->
<div class="modal-overlay" id="modal-overlay" role="dialog" aria-modal="true" aria-label="Finalizar pedido">
  <div class="modal">
    <div id="modal-content"></div>
  </div>
</div>

<!-- ── Toast Container ───────────────────────────────────────────────────── -->
<div id="toast-container" role="status" aria-live="polite"></div>

<script>
  document.getElementById('footer-year').textContent = new Date().getFullYear();
</script>
<script src="catalogo.js"></script>
</body>
</html>
